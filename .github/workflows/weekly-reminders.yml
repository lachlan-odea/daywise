name: Weekly reminders

on:
  schedule:
    # Fridays 06:00 UTC ≈ 4pm AEST / 5pm AEDT (Australian afternoon).
    - cron: '0 6 * * 5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Log only — do not actually send'
        type: boolean
        default: false
      test_email:
        description: 'Send every message to this address instead of real users (testing)'
        default: ''

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Send weekly reminders
        run: node scripts/send-weekly-reminders.mjs
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_FROM_NAME: daywise
          SENDGRID_UNSUB_GROUP_ID: ${{ secrets.SENDGRID_UNSUB_GROUP_ID }}
          APP_URL: https://lachlan-odea.github.io/daywise
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
          TEST_EMAIL: ${{ inputs.test_email }}
